name: codex-pr-automation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: codex-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  codex_review:
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@codex_review') &&
        !contains(github.event.comment.body, 'fix') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout PR head ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number || github.event.issue.number }}/head

      - name: Resolve PR base branch
        id: resolve_pr_base
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            if (context.payload.pull_request?.base?.ref) {
              core.setOutput('base_ref', context.payload.pull_request.base.ref);
              return;
            }

            const pull_number = context.payload.issue.number;
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
            });

            core.setOutput('base_ref', pull.base.ref);

      - name: Fetch base/head refs
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          PR_BASE_REF: ${{ steps.resolve_pr_base.outputs.base_ref }}
        run: |
          git fetch --no-tags origin "$PR_BASE_REF" "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: drop-sudo
          sandbox: read-only
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number || github.event.issue.number }} in ${{ github.repository }}.
            Review ONLY the diff between base/head.
            Return markdown with sections:
            1) Summary
            2) High-risk issues
            3) Suggested fixes
            4) Missing tests
            5) Merge risk score (low/medium/high)

            Use concise, actionable comments.

      - name: Post review comment
        if: steps.run_codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const issue_number = context.payload.pull_request?.number ?? context.payload.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });

  codex_fix:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@codex_review fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Codex fix
        id: codex_fix
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: drop-sudo
          sandbox: workspace-write
          prompt: |
            A reviewer requested auto-fix on PR #${{ github.event.issue.number }}.
            Apply minimal, surgical fixes for obvious issues in the changed code.
            Prioritize compile/test stability. Avoid broad refactors.
            After changes, explain what you changed and why.

      - name: Resolve PR base branch
        id: pr_meta
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            core.setOutput("base_ref", pr.base.ref);

      - name: Verify tests
        run: ./gradlew test

      - name: Create PR with fixes
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "fix: apply codex auto-fix for PR #${{ github.event.issue.number }}"
          branch: codex/auto-fix-pr-${{ github.event.issue.number }}-${{ github.run_id }}
          base: ${{ steps.pr_meta.outputs.base_ref }}
          title: "Codex auto-fix for PR #${{ github.event.issue.number }}"
          body: |
            Auto-generated by `codex-pr-automation.yml` via `@codex_review fix`.

            Codex output:
            ---
            ${{ steps.codex_fix.outputs.final-message }}
